<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, noarchive, nosnippet" />
    <title>SS BuilderTech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Newsreader:opsz,wght@6..72,650..760&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #202225;
        background: #f5f3ee;
      }

      section {
        width: min(100%, 680px);
        border: 1px solid #d8d1c6;
        border-radius: 8px;
        background: #ffffff;
        padding: clamp(28px, 6vw, 52px);
      }

      h1 {
        margin: 0;
        font-family: Newsreader, Georgia, serif;
        font-size: 2.7rem;
        font-weight: 720;
        line-height: 1.08;
        letter-spacing: 0;
        color: #0f766e;
      }

      p {
        margin: 22px 0 0;
        max-width: 54ch;
        color: #60656c;
        font-size: 1.05rem;
        line-height: 1.65;
      }

      a {
        color: #0f766e;
        font-weight: 700;
      }

      @media (max-width: 640px) {
        body {
          padding: 18px;
        }

        section {
          padding: 28px;
        }

        h1 {
          font-size: 1.95rem;
        }
      }
    </style>
  </head>
  <body>
    <section>
      <h1>Building systems for the next chapter of construction.</h1>
      <p>
        SS BuilderTech is operating in stealth mode while its systems,
        partnerships, and project work take shape.
      </p>
      <p>
        Return to <a href="/">ssbuildertech.com</a> or email
        <a href="mailto:info@ssbuildertech.com">info@ssbuildertech.com</a>.
      </p>
    </section>
  </body>
</html>
