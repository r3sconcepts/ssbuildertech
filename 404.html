<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, noarchive, nosnippet" />
    <title>SS BuilderTech</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #202225;
        background: #f5f3ee;
      }

      section {
        width: min(100%, 680px);
        border: 1px solid #d8d1c6;
        border-radius: 8px;
        background: #ffffff;
        padding: clamp(28px, 6vw, 52px);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 7vw, 4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 22px 0 0;
        max-width: 54ch;
        color: #60656c;
        font-size: 1.05rem;
        line-height: 1.65;
      }

      a {
        color: #0f766e;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <section>
      <h1>Website update in progress</h1>
      <p>
        The SS BuilderTech website is being updated so the information shown
        here is accurate.
      </p>
      <p>
        Return to <a href="/">ssbuildertech.com</a> or email
        <a href="mailto:info@ssbuildertech.com">info@ssbuildertech.com</a>.
      </p>
    </section>
  </body>
</html>
